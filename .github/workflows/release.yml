name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-slave:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates/iec104sim-app -> ../../target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/iec104sim-app
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installers for your platform.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload updater artifacts (sig + bundles)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ runner.os }}" in
            macOS)
              case "${{ matrix.rust_target }}" in
                aarch64-apple-darwin) arch="aarch64" ;;
                x86_64-apple-darwin) arch="x64" ;;
                *) echo "unknown rust_target ${{ matrix.rust_target }}" ; exit 1 ;;
              esac
              for sig in target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz.sig; do
                [ -e "$sig" ] || continue
                stem=$(basename "$sig" .app.tar.gz.sig)
                renamed="/tmp/${stem}_${arch}.app.tar.gz.sig"
                cp "$sig" "$renamed"
                echo "Uploading $renamed"
                gh release upload "${{ github.ref_name }}" "$renamed" --clobber --repo "${{ github.repository }}"
              done
              ;;
            Linux)
              for f in target/release/bundle/appimage/IEC104*.AppImage.tar.gz target/release/bundle/appimage/IEC104*.AppImage.tar.gz.sig; do
                [ -e "$f" ] || continue
                echo "Uploading $f"
                gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
              done
              ;;
            Windows)
              for f in target/release/bundle/nsis/IEC104*.nsis.zip target/release/bundle/nsis/IEC104*.nsis.zip.sig; do
                [ -e "$f" ] || continue
                echo "Uploading $f"
                gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
              done
              ;;
          esac

  build-master:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates/iec104master-app -> ../../target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: master-frontend

      - name: Build frontend
        run: npm run build
        working-directory: master-frontend

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/iec104master-app
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installers for your platform.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload updater artifacts (sig + bundles)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ runner.os }}" in
            macOS)
              case "${{ matrix.rust_target }}" in
                aarch64-apple-darwin) arch="aarch64" ;;
                x86_64-apple-darwin) arch="x64" ;;
                *) echo "unknown rust_target ${{ matrix.rust_target }}" ; exit 1 ;;
              esac
              for sig in target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz.sig; do
                [ -e "$sig" ] || continue
                stem=$(basename "$sig" .app.tar.gz.sig)
                renamed="/tmp/${stem}_${arch}.app.tar.gz.sig"
                cp "$sig" "$renamed"
                echo "Uploading $renamed"
                gh release upload "${{ github.ref_name }}" "$renamed" --clobber --repo "${{ github.repository }}"
              done
              ;;
            Linux)
              for f in target/release/bundle/appimage/IEC104*.AppImage.tar.gz target/release/bundle/appimage/IEC104*.AppImage.tar.gz.sig; do
                [ -e "$f" ] || continue
                echo "Uploading $f"
                gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
              done
              ;;
            Windows)
              for f in target/release/bundle/nsis/IEC104*.nsis.zip target/release/bundle/nsis/IEC104*.nsis.zip.sig; do
                [ -e "$f" ] || continue
                echo "Uploading $f"
                gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
              done
              ;;
          esac

  publish-manifest:
    needs: [build-slave, build-master]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install script deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Generate manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/gen-update-manifest.mjs ${{ github.ref_name }}
      - name: Upload manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} latest-slave.json latest-master.json --clobber
